<div class="container">
    <span class="h1">
        {{title}}
    </span>
    <div class="resultados-container">
        @for (c of candidaturas; track $index) {
        <div class="candidatura">
            <div class="info">
                <span class="label">{{ c.label }}</span>
                <span class="votes">{{ c.votes }} votos</span>
            </div>
            <div class="barra">
                <div class="relleno" [style.width.%]="porcentaje(c.votes)"></div>
            </div>
        </div>
        }
    </div>
</div>
