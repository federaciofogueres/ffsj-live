<div class="scrollable">
    <div class="container scrollable-content">
        <span class="h1">
            {{config.list?.title}}
        </span>

        <button type="button" class="favorites-filter-button" [class.favorites-filter-button--active]="showOnlyFavorites"
            [attr.aria-pressed]="showOnlyFavorites" (click)="toggleFavoritesFilter()">
            <i class="bi" [ngClass]="showOnlyFavorites ? 'bi-star-fill' : 'bi-star'"></i>
            <span>Mis favoritas</span>
        </button>

        @if (config.list?.searching) {
        <div class="input-group m-2 mb-3 w-auto">
            <span class="input-group-text" id="basic-addon1">
                <i class="bi bi-person-circle"></i>
            </span>
            <input type="text" class="form-control" [formControl]="searchControl" [placeholder]="config.list?.searching"
                (input)="filterItems($event)">
        </div>
        }

        @if (loading) {
        <lib-ffsj-spinner [fullscreen]="true"></lib-ffsj-spinner>
        }@else {
        <div class="item-list">
            @for (item of filteredItems; track $index) {
            <app-item-card [item]="item" [showFavoriteCount]="userAdmin"></app-item-card>
            } @empty {
            <div class="empty-list">
                No hay candidatas que coincidan con el filtro.
            </div>
            }
        </div>
        }
    </div>
</div>
