<div class="scrollable">
    <div class="container scrollable-content">
        <span class="h1">
            {{config.list?.title}}
        </span>

        @if (config.list?.searching) {
        <div class="input-group m-2 mb-3 w-auto">
            <span class="input-group-text" id="basic-addon1">
                <i class="bi bi-person-circle"></i>
            </span>
            <input type="text" class="form-control" [formControl]="searchControl" [placeholder]="config.list?.searching"
                (input)="filterItems($event)">
        </div>
        }

        @if (loading) {
        <lib-ffsj-spinner [fullscreen]="true"></lib-ffsj-spinner>
        }@else {
        <div class="item-list">
            @for (item of filteredItems; track $index) {
            <app-item-card [item]="item" [showFavoriteCount]="userAdmin"></app-item-card>
            }
        </div>
        }
    </div>
</div>
