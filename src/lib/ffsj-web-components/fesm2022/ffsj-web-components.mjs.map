<div class="login-shell">
  <div class="login-scroll">
    <div class="login-container">
      <div class="banner">
        <h1 class="brand-title">
          <img src="https://intranet.hogueras.es/wp-content/uploads/2016/12/logofede.png" class="img-fluid" alt="">
          <span>{{ title }}</span>
        </h1>
        <h4 class="brand-subtitle">© Federació de Les Fogueres de Sant Joan</h4>
      </div>

      <div class="login-card">
        <div class="login-card-header">
          <h4 class="titulo-consultas">
            {{ subtitle }}
          </h4>
        </div>

        <div class="field-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-control" [formControl]="username" value="">
        </div>

        @if (showChangePasswordForm) {
          <div class="field-group">
            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" class="form-control" [formControl]="password" value="">
          </div>
          <div class="field-group">
            <label for="repeatPassword">Repite la nueva contraseña</label>
            <input type="password" id="repeatPassword" class="form-control" [formControl]="repeatPassword" value="">
          </div>
        } @else {
          <div class="field-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-control" [formControl]="password" value="">
          </div>
        }

        <div class="submit-button">
          @if(showChangePasswordForm) {
            <button type="button" (click)="changePassword()" [disabled]="loading">
              Actualizar contraseña
            </button>
          } @else {
            <button type="button" (click)="login()" [disabled]="loading">
              Iniciar sesión
            </button>
          }
        </div>
      </div>
    </div>
  </div>

  <lib-ffsj-alert></lib-ffsj-alert>
</div>
