<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  @if (data.innerHtml) {
  <div [innerHTML]="data.innerHtml"></div>
  } @else {
  {{ data.content }}
  }
</mat-dialog-content>

<mat-dialog-actions>
  @for (button of data.buttonsAlert; track $index) {
  <button mat-button (click)="dialogSelfRef.close(button)">
    {{ button }}
  </button>
  }
</mat-dialog-actions>
